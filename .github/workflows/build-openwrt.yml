name: Build OpenWrt

on:
  push:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-openwrt.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-openwrt.yml'
  workflow_dispatch:
    inputs:
      target:
        description: '编译目标 (留空则编译所有)'
        required: false
        default: ''
      clean_build:
        description: '是否全量编译 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

concurrency:
  group: build-openwrt-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  REPO_BRANCH: main-nss
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai

jobs:
  matrix:
    name: 生成编译矩阵
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 生成目标矩阵
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.target }}" ]; then
            echo "matrix={\"include\":[{\"config\":\"${{ github.event.inputs.target }}\"}]}" >> $GITHUB_OUTPUT
          else
            set -o pipefail
            files=$(printf '%s\n' configs/*.config 2>/dev/null | sed 's#.*/##; s/\.config$//')
            configs=$(echo "$files" | grep -v '^default$' || true)
            if [ -z "$configs" ]; then
              echo 'matrix={"include":[{"config":"default"}]}' >> $GITHUB_OUTPUT
            else
              matrix=$(echo "$configs" | jq -R . | jq -sc '{include: [.[] | {config: .}]}')
              echo "matrix=$matrix" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: 编译 ${{ matrix.config }}
    needs: matrix
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          sudo -E apt-get -qq update
          sudo -E apt-get -qq full-upgrade -y
          sudo -E apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libfuse-dev libssl-dev libtool \
            lrzsz genisoimage msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip libpython3-dev qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 克隆源码
        working-directory: /workdir
        run: |
          set -euo pipefail
          df -hT $PWD
          git clone --depth 1 --single-branch --branch $REPO_BRANCH $REPO_URL openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 加载自定义 feeds
        run: |
          set -euo pipefail
          if [ -f "feeds.conf.default" ]; then
            cp feeds.conf.default openwrt/feeds.conf.default
          fi
          if [ -f "scripts/customize.sh" ]; then
            chmod +x scripts/customize.sh
            cd openwrt && $GITHUB_WORKSPACE/scripts/customize.sh
          fi

      - name: 更新并安装 feeds
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载配置文件
        run: |
          set -euo pipefail
          CONFIG_FILE="configs/${{ matrix.config }}.config"
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" openwrt/.config
            echo "已加载配置: $CONFIG_FILE"
          elif [ -f "configs/default.config" ]; then
            cp "configs/default.config" openwrt/.config
            echo "已加载默认配置"
          else
            echo "未找到配置文件，使用默认配置"
          fi
          cd openwrt
          make defconfig

      - name: 执行自定义脚本 (编译前)
        env:
          MATRIX_CONFIG: ${{ matrix.config }}
        run: |
          set -euo pipefail
          DIY_SCRIPTS=$(ls $GITHUB_WORKSPACE/scripts/diy-*.sh 2>/dev/null | sort)
          if [ -z "$DIY_SCRIPTS" ]; then
            echo "⚠️ 未找到任何 diy-*.sh 脚本，跳过"
          else
            for SCRIPT in $DIY_SCRIPTS; do
              echo "▶️ 执行: $(basename $SCRIPT)"
              chmod +x "$SCRIPT"
              cd /workdir/openwrt && bash "$SCRIPT"
              echo "✅ 完成: $(basename $SCRIPT)"
            done
          fi

      - name: 重新同步配置
        run: |
          set -euo pipefail
          cd openwrt
          make defconfig

      - name: 缓存 dl 和 ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            openwrt/dl
            /workdir/.ccache
          key: ${{ runner.os }}-openwrt-${{ matrix.config }}-${{ hashFiles('configs/*.config', 'scripts/**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ matrix.config }}-
            ${{ runner.os }}-openwrt-

      - name: 下载编译依赖
        id: download
        run: |
          set -euo pipefail
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 开始编译固件
        id: compile
        run: |
          set -euo pipefail
          cd openwrt
          export CCACHE_DIR=/workdir/.ccache
          export CCACHE_COMPRESS=1
          ccache -M 2G || true
          ccache -s || true
          echo -e "$(nproc) 线程编译中..."
          make -j$(nproc) || make -j1 || make -j1 V=s
          ccache -s || true
          echo "status=success" >> $GITHUB_OUTPUT

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | grep -v '^ROOTFS$' > DEVICES
          if [ $(wc -l < DEVICES) -gt 1 ]; then echo "MultiDevice" > DEVICE_NAME; else cat DEVICES > DEVICE_NAME; fi
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV

          # Artifact 用（分钟）
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

          # 美化文件名/标题用（北京时间，带秒）
          echo "BUILD_TS=$(TZ=Asia/Shanghai date +"%Y%m%d_%H%M%S")" >> $GITHUB_ENV
          echo "BUILD_TS_HUMAN=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

      - name: 检查磁盘空间
        if: (!cancelled())
        run: df -hT

      - name: 整理固件文件
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          cd openwrt/bin/targets/*/*
          KERNEL_VER=$(find -type f -name "*.manifest" -exec grep -oP '^kernel - \K.*?(?=~|-\d+-)' {} \; | head -1)
          [ -n "$KERNEL_VER" ] && echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          retention-days: 7

      - name: 生成统一风格 Release 文件名（前缀自动解析）
        if: steps.organize.outputs.status == 'success'
        run: |
          set -euo pipefail
          cd "${{ env.FIRMWARE }}"

          CFG="${{ matrix.config }}"
          TS="${{ env.BUILD_TS }}"

          OUT="$PWD/release_pretty"
          mkdir -p "$OUT"

          # 元数据类文件（保留原名）
          for f in build.config config.buildinfo feeds.buildinfo version.buildinfo \
                   profiles.json *.manifest Packages.tar.gz; do
            [ -f "$f" ] && cp -f "$f" "$OUT/"
          done

          shopt -s nullglob

          for f in *; do
            [ -f "$f" ] || continue

            # 只处理固件（包含 sysupgrade/factory）
            case "$f" in
              *sysupgrade*|*factory*) ;;
              *) continue ;;
            esac

            base="$(basename "$f")"

            # 1) 前缀：从原文件名取第一个 '-' 前的部分（如 libwrt）
            PREFIX="${base%%-*}"
            [ -z "$PREFIX" ] && PREFIX="firmware"

            # 2) 类型
            if [[ "$base" == *sysupgrade* ]]; then
              TYPE="sysupgrade"
            else
              TYPE="factory"
            fi

            # 3) 扩展名（支持 img.gz / tar.gz）
            if [[ "$base" == *.img.gz ]]; then
              EXT="img.gz"
            elif [[ "$base" == *.tar.gz ]]; then
              EXT="tar.gz"
            else
              EXT="${base##*.}"
            fi

            # 4) 解析 device
            # 常见：<prefix>-qualcommax-ipq60xx-<device>-squashfs-(factory|sysupgrade).<ext>
            DEVICE="unknown"
            if [[ "$base" =~ ^[^-]+-[^-]+-[^-]+-(.+)-squashfs-(factory|sysupgrade)\..+$ ]]; then
              DEVICE="${BASH_REMATCH[1]}"
            else
              DEVICE="$(echo "$base" | sed -E 's/^[^-]+-[^-]+-[^-]+-//; s/-squashfs-.*$//')"
              [ -z "$DEVICE" ] && DEVICE="unknown"
            fi

            NEW="${PREFIX}_${CFG}_${DEVICE}_${TYPE}_${TS}.${EXT}"
            cp -f "$f" "$OUT/$NEW"
          done

          cd "$OUT"
          sha256sum * > sha256sums_pretty.txt

          echo "PRETTY_DIR=$OUT" >> $GITHUB_ENV

      - name: 生成 Release 标签与标题
        id: tag
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          SAFE_TAG="${{ matrix.config }}-$(TZ=Asia/Shanghai date +"%Y.%m.%d-%H-%M")"
          echo "release_tag=$SAFE_TAG" >> $GITHUB_OUTPUT

          PRETTY_NAME="R${{ env.BUILD_TS_HUMAN }} for ${{ matrix.config }}"
          echo "release_name=$PRETTY_NAME" >> $GITHUB_OUTPUT

          cd /workdir/openwrt
          COMMIT_HASH=$(git log -1 --format="%H" | cut -c1-8)
          COMMIT_AUTHOR=$(git log -1 --format="%an")
          COMMIT_DATE=$(git log -1 --format="%cd" --date=format:"%Y-%m-%d")
          COMMIT_MSG=$(git log -1 --format="%s")
          cd $GITHUB_WORKSPACE

          CONFIG="${{ matrix.config }}"
          CFG_FILE="configs/${CONFIG}.cfg"
          [ -f "$CFG_FILE" ] || CFG_FILE="configs/default.cfg"

          DEFAULT_IP="192.168.100.1"
          DEFAULT_THEME="未设置"
          DESC="This is OpenWrt Firmware for ${CONFIG}"
          WIFI_SSID=""
          WIFI_PASSWORD=""
          NOWIFI=""
          if [ -f "$CFG_FILE" ]; then
            _ip=$(grep -m1 '^DEFAULT_IP=' "$CFG_FILE" | cut -d= -f2 | tr -d ' ')
            _theme=$(grep -m1 '^DEFAULT_THEME=' "$CFG_FILE" | cut -d= -f2 | tr -d ' ')
            _desc=$(grep -m1 '^DESC=' "$CFG_FILE" | cut -d= -f2-)
            _ssid=$(grep -m1 '^WIFI_SSID=' "$CFG_FILE" | cut -d= -f2-)
            _password=$(grep -m1 '^WIFI_PASSWORD=' "$CFG_FILE" | cut -d= -f2-)
            _nowifi=$(grep -m1 '^NOWIFI=' "$CFG_FILE" | cut -d= -f2 | tr -d ' ')
            [ -n "$_ip" ]       && DEFAULT_IP="$_ip"
            [ -n "$_theme" ]    && DEFAULT_THEME="$_theme"
            [ -n "$_desc" ]     && DESC="$_desc"
            [ -n "$_ssid" ]     && WIFI_SSID="$_ssid"
            [ -n "$_password" ] && WIFI_PASSWORD="$_password"
            [ -n "$_nowifi" ]   && NOWIFI="$_nowifi"
          fi

          {
            echo "$DESC"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 固件信息"
            echo ""
            echo "| 项目 | 内容 |"
            echo "|------|------|"
            echo "| 🖥️ 平台 | \`${CONFIG}\` |"
            echo "| 🔗 固件源码 | [$REPO_URL]($REPO_URL) |"
            echo "| 🌿 源码分支 | \`$REPO_BRANCH\` |"
            echo "| 🌐 默认地址 | \`${DEFAULT_IP}\` |"
            echo "| 🎨 默认主题 | \`${DEFAULT_THEME}\` |"
            echo "| 🔑 默认密码 | 无 |"
            if [ "$NOWIFI" = "true" ]; then
              echo "| 📶 WiFi | 无线版本不含 WiFi |"
            elif [ -n "$WIFI_SSID" ]; then
              echo "| 📶 WiFi 名称 | \`${WIFI_SSID}\` |"
              echo "| 🔐 WiFi 密码 | \`${WIFI_PASSWORD}\` |"
            fi
            echo ""
            echo "## 📋 代码信息"
            echo ""
            echo "| 项目 | 内容 |"
            echo "|------|------|"
            echo "| 👤 作者 | ${COMMIT_AUTHOR} |"
            echo "| 📅 时间 | ${COMMIT_DATE} |"
            echo "| 📝 内容 | ${COMMIT_MSG} |"
            echo "| #️⃣ Hash | \`${COMMIT_HASH}\` |"
            echo ""
            echo "> 编译时间: ${{ env.BUILD_TS_HUMAN }} (北京时间)"
            echo ""
            echo "## 📁 Release 文件命名规则"
            echo ""
            echo "- 固件：\`<prefix>_${CONFIG}_<device>_<factory|sysupgrade>_${{ env.BUILD_TS }}.<ext>\`"
            echo "- 校验：\`sha256sums_pretty.txt\`（对应 Release 内文件名）"
          } > release.txt

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 发布到 Release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe
        if: steps.tag.outputs.status == 'success'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_name }}
          body_path: release.txt
          files: ${{ env.PRETTY_DIR }}/*

      - name: 删除旧的 Releases
        uses: dev-drprasad/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 删除旧的 Workflow 运行记录
        uses: Mattraks/delete-workflow-runs@bd2822c9d98065c9766fb1f4bbc32325c47de4fb
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          retain_days: 1
          keep_minimum_runs: 3
      - name: 收集失败日志
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p failure-logs
          [ -d openwrt/logs ] && cp -r openwrt/logs failure-logs/ || true
          [ -f openwrt/.config ] && cp openwrt/.config failure-logs/ || true
          [ -f openwrt/.config.old ] && cp openwrt/.config.old failure-logs/ || true
          [ -f openwrt/build.log ] && cp openwrt/build.log failure-logs/ || true

      - name: 上传失败日志
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: OpenWrt_fail_logs_${{ matrix.config }}_${{ github.run_id }}
          path: failure-logs
          retention-days: 7
